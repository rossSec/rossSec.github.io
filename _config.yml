title: PenTest Blog
description: "A blog for CTF writeups and vulnerability research"
author:
  name: "rossSec"
  email: "someone@somewebsite.somedomain"
  url: "https://rosssec.github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "rossSec"
year : "2023"
